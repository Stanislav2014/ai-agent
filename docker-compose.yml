services:
  agent:
    build: .
    image: ai-agent:latest
    environment:
      LLM_BASE_URL: ${LLM_BASE_URL:-http://lemonade:8000/api/v1}
      LLM_MODEL: ${LLM_MODEL:-Qwen3-4B-Instruct-2507-GGUF}
      LLM_API_KEY: ${LLM_API_KEY:-not-needed}
      MAX_STEPS: ${MAX_STEPS:-8}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-180}
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
      - ./workspace:/workspace:ro
      - ./docs/dialogs:/app/dialogs:rw
    networks:
      - llm-net
    stdin_open: true
    tty: true

networks:
  llm-net:
    external: true
